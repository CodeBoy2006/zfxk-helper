<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>正方选课助手 · 初始化配置</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body data-page="setup">
    <a class="github-corner-ribbon" href="https://github.com/CodeBoy2006/zfxk-helper" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" fill-rule="evenodd" d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.16c-3.2.7-3.88-1.38-3.88-1.38-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.04 1.77 2.72 1.26 3.38.96.11-.75.41-1.26.74-1.55-2.56-.29-5.25-1.28-5.25-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.04 0 0 .98-.31 3.2 1.18A11.1 11.1 0 0 1 12 6.34c.99 0 1.99.13 2.92.39 2.22-1.49 3.2-1.18 3.2-1.18.63 1.58.23 2.75.11 3.04.74.81 1.19 1.83 1.19 3.09 0 4.42-2.7 5.4-5.27 5.68.42.36.8 1.08.8 2.18v3.23c0 .31.21.68.8.56A11.52 11.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" clip-rule="evenodd"></path>
      </svg>
      <span>GitHub</span>
    </a>
    <main class="setup-shell">
      <section class="setup-panel" aria-label="登录配置">
        <div class="setup-panel-heading">
          <div>
            <h2>登录配置</h2>
            <p>推荐填写账号密码后点击登录获取 Cookie，也可以手动粘贴已登录 Cookie。</p>
          </div>
          <a id="setupReturnLink" class="setup-link-button" href="/">返回</a>
        </div>

        <form id="setupForm" class="setup-form">
          <label>
            教务系统 Base URL
            <input id="setupBaseUrlInput" name="baseUrl" placeholder="https://example.edu.cn/jwglxt" autocomplete="off">
          </label>
          <div class="setup-two-cols">
            <label>
              用户名
              <input id="setupUsernameInput" name="username" autocomplete="username">
            </label>
            <label>
              密码
              <input id="setupPasswordInput" name="password" type="password" autocomplete="current-password">
            </label>
          </div>
          <label>
            选课入口 Path
            <input id="setupPagePathInput" name="pagePath" autocomplete="off">
          </label>
          <label>
            Cookie
            <textarea id="setupCookieInput" name="cookie" rows="4" placeholder="JSESSIONID=...; route=..." autocomplete="off"></textarea>
          </label>

          <div class="setup-actions">
            <button id="setupLoginBtn" type="button" class="secondary">登录获取 Cookie</button>
            <button id="setupSolveCaptchaBtn" type="button" class="secondary">仅验证验证码</button>
            <button id="setupSubmitBtn" type="submit">保存并继续</button>
          </div>
        </form>

        <div id="setupMessage" class="setup-message" role="status" aria-live="polite">等待配置。</div>
      </section>
    </main>
    <script type="module" src="/web/setup.js"></script>
  </body>
</html>
