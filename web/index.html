<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>正方选课助手</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>正方选课助手</h1>
          <p id="sessionSummary">未初始化会话</p>
        </div>
        <div class="topbar-actions">
          <a id="configLink" class="topbar-link-button config-link-button" href="/setup?next=/" title="修改保存的登录配置">配置</a>
          <a id="autoSelectionLink" class="topbar-link-button" href="/auto-selection" title="打开独立自动抢课页面">自动抢课页面</a>
          <button id="refreshSnapshotBtn" type="button" title="刷新已选">刷新</button>
          <button id="clearLogBtn" type="button" title="清空日志">清空日志</button>
        </div>
      </header>

      <section class="session-panel session-status-panel" aria-label="会话状态">
        <div class="session-status-card">
          <div>
            <span>保存配置</span>
            <strong id="sessionConfigSummary">读取本地配置中...</strong>
            <p>主页面会自动使用保存的 Base URL、Cookie 和选课入口初始化。</p>
          </div>
          <div class="session-status-actions">
            <button id="reinitializeSessionBtn" type="button" class="secondary">重新初始化</button>
          </div>
        </div>
        <div class="course-type-switch" aria-label="课程类型切换">
          <span>当前显示</span>
          <div id="courseTypeTabs" class="course-type-tabs" aria-live="polite"></div>
        </div>
      </section>

      <section id="filterPanel" class="filter-panel collapsed" aria-label="筛选条件">
        <form id="searchForm">
          <div class="filter-search-row">
            <input id="keywordInput" name="keyword" placeholder="可输入课程号/课程名称/教学班名称/教师姓名/教师工号查询!" autocomplete="off">
            <button type="submit">查询</button>
            <button id="resetFiltersBtn" type="button" class="secondary">重置条件</button>
          </div>
          <div id="filterRows" class="filter-rows" aria-live="polite"></div>
          <button id="toggleFiltersBtn" type="button" class="filter-toggle">展开</button>
        </form>
      </section>

      <section class="workspace">
        <aside class="catalog-pane" aria-label="课程候选">
          <div class="section-heading">
            <div class="section-heading-main">
              <h2>课程列表</h2>
              <span id="courseTotalBadge">共 0 门</span>
            </div>
            <div class="section-heading-actions">
              <button id="exportCoursesBtn" class="section-text-button" type="button" title="导出当前课程列表的完整信息">导出课程</button>
              <button id="catalogSearchBtn" class="section-text-button" type="button">搜索</button>
            </div>
          </div>
          <div id="courseList" class="course-list" aria-live="polite"></div>
        </aside>

        <section class="detail-pane" aria-label="教学班详情">
          <div class="section-heading">
            <div class="section-heading-main">
              <h2>教学班</h2>
              <span id="classCountBadge">共 0 个教学班</span>
            </div>
            <button id="classSortBtn" class="section-text-button" type="button">默认排序</button>
          </div>
          <div id="classList" class="class-list"></div>
        </section>

        <aside id="chosenPanel" class="chosen-pane" aria-label="已选课程">
          <div class="section-heading">
            <div class="section-heading-main">
              <h2>已选课程</h2>
              <span id="chosenTotals">0 门 / 0 学分</span>
            </div>
            <button id="exportSelectedBtn" class="section-text-button" type="button" title="导出当前已选课程详细信息">导出已选</button>
          </div>
          <div id="chosenList" class="chosen-list"></div>
          <button id="saveOrderBtn" type="button">保存排序</button>
        </aside>
      </section>

      <section class="schedule-panel" aria-label="当前已选课程时间分布">
        <div class="section-heading">
          <h2>已选课表</h2>
          <span id="scheduleStatus">暂无课程</span>
        </div>
        <div class="schedule-legend" aria-hidden="true">
          <span><i class="legend-swatch free"></i>空闲</span>
          <span><i class="legend-swatch busy"></i>已选课程</span>
          <span><i class="legend-swatch conflict"></i>时间重叠</span>
        </div>
        <div class="schedule-scroll">
          <table class="schedule-grid">
            <thead>
              <tr>
                <th scope="col">节次</th>
                <th scope="col">星期一</th>
                <th scope="col">星期二</th>
                <th scope="col">星期三</th>
                <th scope="col">星期四</th>
                <th scope="col">星期五</th>
                <th scope="col">星期六</th>
                <th scope="col">星期日</th>
              </tr>
            </thead>
            <tbody id="selectedScheduleBody"></tbody>
          </table>
        </div>
      </section>

      <section class="activity-panel" aria-label="操作日志">
        <div class="section-heading">
          <h2>操作日志</h2>
          <span id="statusBadge">idle</span>
        </div>
        <ol id="activityLog"></ol>
      </section>
    </main>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
